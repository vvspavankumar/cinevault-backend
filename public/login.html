<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineVault Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="moviereview.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0A0A0A;
}
.auth-card{
    background:#1A1A1A;
    padding:40px;
    border-radius:10px;
    width:350px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,255,255,0.3);
}
.auth-card h2{
    margin-bottom:20px;
    color:#00FFFF;
}
.auth-card input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #00FFFF;
    background:#0A0A0A;
    color:white;
    border-radius:5px;
}
.auth-card button{
    width:100%;
    padding:10px;
    background:#00FFFF;
    border:none;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}
.auth-card button:hover{
    background:#00b4b4;
}
.auth-card p{
    margin-top:15px;
}
.auth-card a{
    color:#00FFFF;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="auth-card">
    <h2>🎬 CineVault Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="loginUser()">Login</button>

    <p>Don't have account? <a href="register.html">Register</a></p>
</div>

<script src="moviereview.js"></script>
</body>
</html>
